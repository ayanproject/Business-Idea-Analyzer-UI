<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schmooze AI Validator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 50px;
        }

        h1 { text-align: center; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 40px; }

        /* Input Section */
        .input-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box; /* Fixes padding overflow */
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }

        /* Loading Spinner */
        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Report Section */
        .report-container {
            display: none; /* Hidden by default */
            margin-top: 40px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border-left: 5px solid var(--accent);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .score { font-size: 2em; font-weight: bold; color: var(--success); }
        .risk { font-size: 1.5em; font-weight: bold; }
        .risk.High { color: var(--danger); }
        .risk.Medium { color: #f59e0b; }
        .risk.Low { color: var(--success); }

        .details h3 { border-bottom: 1px solid #334155; padding-bottom: 5px; margin-top: 20px; }

        /* Dashboard List */
        .history-section {
            margin-top: 60px;
        }
        .history-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #334155;
            cursor: pointer;
        }
        .history-card:hover { background: #273548; }

    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 AI Startup Validator</h1>
        <p class="subtitle">Enter your startup idea and let our AI analyze its potential.</p>

        <div class="input-box">
            <label for="ideaInput">What are you building?</label>
            <textarea id="ideaInput" placeholder="e.g. An Uber for dog walkers in crowded cities..."></textarea>
            <button onclick="validateIdea()" id="btnValidate">Validate Idea</button>
        </div>

        <div class="loader" id="loader"></div>

        <div class="report-container" id="reportView">
            <h2>Validation Report</h2>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div style="color: #94a3b8; font-size: 0.9em;">Profitability</div>
                    <div class="score" id="resScore">0/100</div>
                </div>
                <div class="metric-card">
                    <div style="color: #94a3b8; font-size: 0.9em;">Risk Level</div>
                    <div class="risk" id="resRisk">-</div>
                </div>
                <div class="metric-card">
                    <div style="color: #94a3b8; font-size: 0.9em;">Status</div>
                    <div style="margin-top: 10px; color: #3b82f6;">Analyzed</div>
                </div>
            </div>

            <div class="details">
                <h3>Problem & Customer</h3>
                <p id="resProblem"></p>
                <p><strong>Target:</strong> <span id="resTarget"></span></p>

                <h3>Market Analysis</h3>
                <p id="resMarket"></p>

                <h3>Competitors</h3>
                <p id="resCompetitors"></p>

                <h3>Tech Stack Recommendation</h3>
                <p id="resTech" style="font-family: monospace; color: #3b82f6;"></p>
            </div>
        </div>

        <div class="history-section">
            <h2>Recent Validations</h2>
            <div id="historyList">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://new-idea-analyzer-production.up.railway.app/api";

        async function validateIdea() {
            const idea = document.getElementById('ideaInput').value;
            if (!idea) return alert("Please enter an idea!");

            // UI State: Loading
            document.getElementById('btnValidate').disabled = true;
            document.getElementById('btnValidate').innerText = "Analyzing...";
            document.getElementById('loader').style.display = "block";
            document.getElementById('reportView').style.display = "none";

            try {
                const response = await fetch(`${API_URL}/validate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idea: idea })
                });

                if (!response.ok) throw new Error("API Failed");

                const data = await response.json();
                renderReport(data);
                loadHistory(); // Refresh list

            } catch (error) {
                alert("Error connecting to server. Is Spring Boot running?");
                console.error(error);
            } finally {
                document.getElementById('btnValidate').disabled = false;
                document.getElementById('btnValidate').innerText = "Validate Idea";
                document.getElementById('loader').style.display = "none";
            }
        }

        function renderReport(data) {
            document.getElementById('reportView').style.display = "block";
            
            // Fill Data
            document.getElementById('resScore').innerText = data.profitabilityScore + "/100";
            
            const riskEl = document.getElementById('resRisk');
            riskEl.innerText = data.riskLevel;
            riskEl.className = `risk ${data.riskLevel}`; // Applies color class

            document.getElementById('resProblem').innerText = data.problemSummary;
            document.getElementById('resTarget').innerText = data.targetCustomer;
            document.getElementById('resMarket').innerText = data.marketAnalysis;
            document.getElementById('resCompetitors').innerText = data.competitors;
            document.getElementById('resTech').innerText = data.techStack;
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_URL}/ideas`);
                const ideas = await response.json();
                
                const list = document.getElementById('historyList');
                list.innerHTML = ""; // Clear current list

                // Reverse to show newest first
                ideas.reverse().forEach(idea => {
                    const div = document.createElement('div');
                    div.className = 'history-card';
                    div.innerHTML = `
                        <strong>${idea.originalIdea.substring(0, 50)}...</strong>
                        <div style="font-size: 0.8em; color: #94a3b8; margin-top: 5px;">
                            Score: ${idea.profitabilityScore} | Risk: ${idea.riskLevel}
                        </div>
                    `;
                    // Click to view details again
                    div.onclick = () => renderReport(idea);
                    list.appendChild(div);
                });
            } catch (error) {
                console.log("Could not fetch history");
            }
        }

        // Load history on page load
        window.onload = loadHistory;
    </script>
</body>
</html>
